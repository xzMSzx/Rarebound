kind = "web"
previewPath = "/"
title = "MSGE-Lite"
version = "1.0.0"
id = "artifacts/msge-lite"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23985

[services.development]
run = "pnpm --filter @workspace/msge-lite run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/msge-lite", "run", "build" ]
publicDir = "artifacts/msge-lite/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23985"
BASE_PATH = "/"
