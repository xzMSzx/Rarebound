<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Rarebound Holo Tilt Rig Test</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #060608;
        padding: 24px;
      }

      .page-shell {
        width: min(360px, 100%);
        padding: 40px;
        overflow: visible;
      }

      .card {
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <div class="card" data-render-tier="showcase" data-rb-interactive="true" data-card-state="interactive">
        <div class="card__animator">
          <div class="card__translater">
            <img class="card__image" src="./test-card.jpeg.jpg" alt="Greninja ex SIR Test Asset" />
            <div class="card__glare"></div>
            <div class="card__shine"></div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { HoloController } from './src/utils/HoloController.js';

      // Find all interactive cards and boot up their physics engines
      const cards = document.querySelectorAll('.card[data-rb-interactive="true"]');
      cards.forEach(card => {
        window.activeHoloController = new HoloController(card);
      });
    </script>
  </body>
</html>
